<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-shell">
    <header class="admin-header">
      <div>
        <h1>Portfolio Admin</h1>
        <p>GUI editor for your portfolio content</p>
      </div>
      <div id="authState" class="auth-state"></div>
    </header>

    <section id="loginSection" class="panel login-panel">
      <h2>Admin Login</h2>
      <p class="login-note">Sign in with your admin credentials to manage portfolio content.</p>
      <form id="loginForm">
        <label>
          Username
          <input name="username" placeholder="Enter username" required />
        </label>
        <label>
          Password
          <input name="password" placeholder="Enter password" type="password" required />
        </label>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
    </section>

    <section id="adminSection" class="hidden">
      <div class="panel action-bar">
        <div class="actions-left">
          <button id="refreshBtn" class="btn">Refresh</button>
          <button id="saveBtn" class="btn btn-primary" disabled>Save Draft</button>
          <button id="publishBtn" class="btn btn-success">Publish</button>
          <button id="resetBtn" class="btn btn-warning">Reset Draft</button>
        </div>
        <div class="actions-right">
          <span id="dirtyBadge" class="status clean">Saved</span>
          <button id="logoutBtn" class="btn btn-danger">Logout</button>
        </div>
      </div>

      <div class="admin-grid">
        <aside class="panel side-nav">
          <h3>Content Sections</h3>
          <nav id="tabNav" class="tab-nav"></nav>
        </aside>

        <main class="panel workspace-panel">
          <div id="formErrors" class="form-errors hidden"></div>
          <div id="workspace"></div>
        </main>
      </div>

      <section class="panel quick-links">
        <h3>Quick Links</h3>
        <p>Public data: <a href="/api/content/published" target="_blank">/api/content/published</a></p>
        <p>Admin page: <a href="/admin" target="_blank">/admin</a></p>
      </section>
    </section>
  </div>

  <div id="toastStack" class="toast-stack" aria-live="polite"></div>
  <script src="admin.js"></script>
</body>
</html>
