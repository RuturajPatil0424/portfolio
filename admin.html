<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Admin</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Portfolio Admin Panel</h1>
      <div id="authState"></div>
    </header>

    <section id="loginSection" class="card">
      <h2>Login</h2>
      <form id="loginForm">
        <input name="username" placeholder="Username" required />
        <input name="password" placeholder="Password" type="password" required />
        <button type="submit">Login</button>
      </form>
    </section>

    <section id="adminSection" class="hidden">
      <div class="toolbar card">
        <button id="refreshBtn">Refresh Draft</button>
        <button id="saveBtn">Save Draft</button>
        <button id="publishBtn">Publish</button>
        <button id="resetBtn">Reset Draft = Published</button>
        <button id="logoutBtn" class="danger">Logout</button>
      </div>

      <div class="grid">
        <div class="card">
          <h2>Section Visibility + Order + Label</h2>
          <div id="sectionsEditor"></div>
          <button id="applySectionBtn">Apply Section Changes</button>
        </div>

        <div class="card">
          <h2>Media Manager</h2>
          <form id="uploadForm">
            <input type="file" name="file" required />
            <button type="submit">Upload</button>
          </form>
          <div id="mediaList"></div>
        </div>
      </div>

      <section class="card">
        <h2>Full JSON Content Editor (All Data)</h2>
        <p>Edit anything here: labels, text, arrays, items, sections, order, and more.</p>
        <textarea id="jsonEditor"></textarea>
      </section>

      <section class="card">
        <h2>Quick API</h2>
        <p>Public data: <a href="/api/content/published" target="_blank">/api/content/published</a></p>
        <p>Admin page: <a href="/admin" target="_blank">/admin</a></p>
      </section>
    </section>
  </div>
  <script src="admin.js"></script>
</body>
</html>
