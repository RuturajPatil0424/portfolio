<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Details | Ruturaj Patil</title>
  <script>
    (function () {
      var key = 'portfolio_theme_pref';
      var pref = localStorage.getItem(key) || 'dark';
      var isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var resolved = pref === 'dark' || pref === 'light' ? pref : (isDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', resolved);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="mesh-bg"></div>
  <main class="details-main">
    <section class="section">
      <div class="details-shell glass-panel reveal active">
        <div class="details-topbar">
          <a id="backToHomeBtn" class="btn btn-secondary btn-small" href="./index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle color theme" aria-pressed="false">Dark</button>
        </div>
        <div id="detailContent"></div>
      </div>
    </section>
  </main>
  <script>
    window.__DETAILS_FALLBACK__ = {
      certificates: [],
      projects: []
    };
  </script>
  <!-- Technology Details Modal -->
  <div id="tech-modal" class="modal-overlay hidden">
      <div class="modal-content glass-panel">
          <button id="close-tech-modal" class="modal-close"><i class="fas fa-times"></i></button>
          
          <div class="tech-modal-header">
              <i id="tech-modal-icon" class=""></i>
              <div class="tech-modal-title">
                  <h2 id="tech-modal-name">Technology Name</h2>
                  <span id="tech-modal-category" class="project-overline">Category</span>
              </div>
          </div>
          
          <div class="tech-modal-body">
              <p id="tech-modal-desc" class="tech-desc">Description goes here.</p>
              
              <div class="tech-modal-grid">
                  <div class="tech-modal-section">
                      <h3>Key Features</h3>
                      <ul id="tech-modal-features" class="task-list">
                          <!-- Populated via JS -->
                      </ul>
                  </div>
                  <div class="tech-modal-section">
                      <h3>Use Cases</h3>
                      <ul id="tech-modal-usecases" class="task-list">
                          <!-- Populated via JS -->
                      </ul>
                  </div>
              </div>
          </div>
      </div>
  </div>

  <!-- Lightbox Modal -->
  <div id="lightbox-modal" class="lightbox-overlay hidden">
      <button id="lightbox-close" class="lightbox-close" aria-label="Close lightbox"><i class="fas fa-times"></i></button>
      <button id="lightbox-prev" class="lightbox-nav lightbox-prev" aria-label="Previous image"><i class="fas fa-chevron-left"></i></button>
      <div class="lightbox-content">
          <img id="lightbox-img" src="" alt="Screenshot Full View" />
          <p id="lightbox-caption" class="lightbox-caption"></p>
      </div>
      <button id="lightbox-next" class="lightbox-nav lightbox-next" aria-label="Next image"><i class="fas fa-chevron-right"></i></button>
  </div>

  <script src="details.js"></script>
</body>
</html>
